<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern UI Card</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* Card */
.card{
width:330px;
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,.2);
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 15px 35px rgba(0,0,0,.3);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.content{
padding:20px;
}

.content h2{
margin-bottom:10px;
}

.content p{
color:#666;
line-height:1.6;
}

.btn{
display:inline-block;
margin-top:15px;
padding:10px 18px;
background:#0d6efd;
color:white;
text-decoration:none;
border-radius:5px;
transition:.3s;
}

.btn:hover{
background:green;
}

/* Popup Notification */
.popup{
position:fixed;
top:20px;
right:-300px;
background:#ff2d55;
color:white;
padding:12px 20px;
border-radius:30px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,.3);
transition:right .6s ease;
z-index:1000;
}

.popup.show{
right:20px;
}
</style>

</head>

<body>

<div class="popup" id="popup">
🔔 New Message
</div>

<div class="card">

<img id="slider"
src="https://picsum.photos/id/1015/400/250">

<div class="content">

<h2>Modern UI Card</h2>

<p>
This modern card demonstrates image slider, CSS transform, transition and popup notification.
</p>

<a href="https://srmcem.ac.in" class="btn" target="_blank">
Visit SRMCEM
</a>

</div>

</div>

<script>

const images=[
"https://picsum.photos/id/1015/400/250",
"https://picsum.photos/id/1016/400/250",
"https://picsum.photos/id/1018/400/250",
"https://picsum.photos/id/1025/400/250",
"https://picsum.photos/id/1035/400/250"
];

let index=0;

setInterval(function(){

index++;

if(index>=images.length){
index=0;
}

document.getElementById("slider").src=images[index];

},3000);

const popup=document.getElementById("popup");

function showPopup(){

popup.classList.add("show");

setTimeout(function(){

popup.classList.remove("show");

},2500);

}

showPopup();

setInterval(showPopup,5000);

</script>

</body>
</html>
